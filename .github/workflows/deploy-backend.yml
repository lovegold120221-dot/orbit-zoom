name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**', 'requirements.txt', '.github/workflows/deploy-backend.yml']
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: orbit-oss-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push container image
        run: |
          az acr build \
            --registry ${{ secrets.AZURE_CONTAINER_REGISTRY }} \
            --image orbit-oss-backend:${{ github.sha }} \
            --file backend/Dockerfile .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_CONTAINER_REGISTRY }}/orbit-oss-backend:${{ github.sha }}
